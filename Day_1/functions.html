<!DOCTYPE html>
<html>
    <head>
        <title>
            DAY1 - RPC_using_Fucntions
        </title>
    </head>
    <body>
        <p>
            Rock Paper Scissors
        </p>
        <br>
        <button onclick="choosecomputermove();alert(computermove);">
            Rock
        </button>
        <button onclick="choosecomputermove();alert(computermove);">
            Paper
        </button>
        <button onclick="choosecomputermove();alert(computermove);">
            Scissors
        </button>

    </body>
    <script>
        let computermove = '';
        function choosecomputermove(){
            computermove = Math.random();
            if(computermove<1/3) {
                computermove = 'Rock';
            }
            else if(computermove<2/3&&computermove>1/3) {
                computermove = 'Paper';
            }
            else {
                computermove = 'Scissors';
            }
        }
    </script>
</html>
