<!DOCTYPE html>
<html>
    <head>
        <title>
            DAY2 - RPC_Objects
        </title>
    </head>
    <body>
        <p>
            Rock Paper Scissors
        </p>
        <button onclick = "choosecomputermove(); Resultt('Rock',computermove);alert(`your move : Rock 
Computer move :${computermove} 
${result}
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Rock
        </button>
        <button onclick = "choosecomputermove(); Resultt('Paper',computermove);alert(`your move : Paper 
Computer move :${computermove} 
${result} 
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Paper
        </button>
        <button onclick = "choosecomputermove(); Resultt('Scissors',computermove);alert(`your move : Scissors 
Computer move :${computermove} 
${result} 
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Scissors
        </button>
        <button onclick = "score.Draw=0;score.Computer=0;score.You=0;alert(`Score Reset`);">
            Reset score
        </button>

    </body>
    <script>
         let computermove = '';
         let result ='';
         const score = {
            Draw : 0,
            Computer : 0,
            You : 0,
         }
        function Resultt(player,computer){
            if(player==='Rock'){
                if(computer==='Rock'){
                    result = 'Draw';
                    score.Draw++;
                }
                else if(computer==='Paper'){
                    result = 'Computer Wins';
                    score.Computer++;
                }
                else{
                    result = 'You Win';
                    score.You++;
                }
            }
            else if(player==='Paper'){
                if(computer==='Rock'){
                    result = 'You Win';
                    score.You++;
                }
                else if(computer==='Paper'){
                    result = 'Draw';
                    score.Draw++;
                }
                else{
                    result = 'Computer Wins';
                    score.Computer++;
                }
            }
            else{
                if(computer==='Rock'){
                    result = 'Computer Wins';
                    score.Computer++;
                }
                else if(computer==='Paper'){
                    result = 'You Win';
                    score.You++;
                }
                else{
                    result = 'Draw';
                    score.Draw++;
                }
            }
        }
        function choosecomputermove(){
            computermove = Math.random();
            if(computermove<1/3) {
                computermove = 'Rock';
            }
            else if(computermove<2/3&&computermove>1/3) {
                computermove = 'Paper';
            }
            else {
                computermove = 'Scissors';
            }
        }
    </script>
</html>
