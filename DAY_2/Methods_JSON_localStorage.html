<!DOCTYPE html>
<html>
    <head>
        <title>
            DAY2 - RPC_Methods_JSON_localStorage
        </title>
    </head>
    <body>
        <p>
            Rock Paper Scissors
        </p>
        <button onclick = "choosecomputermove(); Resultt('Rock',computermove);alert(`your move : Rock 
Computer move :${computermove} 
${result}
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Rock
        </button>
        <button onclick = "choosecomputermove(); Resultt('Paper',computermove);alert(`your move : Paper 
Computer move :${computermove} 
${result} 
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Paper
        </button>
        <button onclick = "choosecomputermove(); Resultt('Scissors',computermove);alert(`your move : Scissors 
Computer move :${computermove} 
${result} 
Draw : ${score.Draw} Computer : ${score.Computer} You : ${score.You}`);">
            Scissors
        </button>
        <button onclick = "score.Draw=0;score.Computer=0;score.You=0;
        localStorage.removeItem('score');
        alert(`Score Reset`);">
            Reset score
        </button>

    </body>
    <script>
         let computermove = '';
         let result ='';
         let score = JSON.parse(localStorage.getItem('score'));
         if(score===null){
            score = {
                Draw : 0,
                Computer : 0,
                You : 0,
            }
         }
         
        function Resultt(player,computer){
            if(player==='Rock'){
                if(computer==='Rock'){
                    result = 'Draw';
                    score.Draw++;
                }
                else if(computer==='Paper'){
                    result = 'Computer Wins';
                    score.Computer++;
                }
                else{
                    result = 'You Win';
                    score.You++;
                }
            }
            else if(player==='Paper'){
                if(computer==='Rock'){
                    result = 'You Win';
                    score.You++;
                }
                else if(computer==='Paper'){
                    result = 'Draw';
                    score.Draw++;
                }
                else{
                    result = 'Computer Wins';
                    score.Computer++;
                }
            }
            else{
                if(computer==='Rock'){
                    result = 'Computer Wins';
                    score.Computer++;
                }
                else if(computer==='Paper'){
                    result = 'You Win';
                    score.You++;
                }
                else{
                    result = 'Draw';
                    score.Draw++;
                }
            }
            localStorage.setItem('score',JSON.stringify(score));
        }
        function choosecomputermove(){
            computermove = Math.random();
            if(computermove<1/3) {
                computermove = 'Rock';
            }
            else if(computermove<2/3&&computermove>1/3) {
                computermove = 'Paper';
            }
            else {
                computermove = 'Scissors';
            }
        }
        // we can also use square brackets to access the values of objects like score['Draw'] instead of score.Draw
        // JSON is javascript obeject notation which is like JS obejects but with less features
        // JSON.stringify() converts a JavaScript object into a JSON string
        // JSON.parse() converts a JSON string into a JavaScript object
        console.log(JSON.stringify(score));
        const jsonstring = JSON.stringify(score);
        // JSON is differ from JS objects like JSON cant have finctions inside it 
        // type of JSON is string it only saves data in string
        console.log(JSON.parse(jsonstring));
        console.log(typeof(JSON.stringify(score))); // this will output in string
        console.log(typeof(JSON.parse(jsonstring))); // this will output in object



        //LOCAL STORAGE
        // like the score restes everytimt we refresh the page so to save the data even after refreshing we can use local storage
        // it takes only string data so we have to convert the object into string using JSON.stringify() and then save it in local storage
        
        //by .getitem we can access this data later after refreshing 
        // for resetting we can .removeItem('score') in the local storage

    </script>
</html>
